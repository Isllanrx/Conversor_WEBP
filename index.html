<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversor WEBP - Premium</title>
    <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
  </head>
  <body>
    <div id="toast-container"></div>
    <div class="background-circles">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
    </div>
    <main class="container">
      <header>
        <h1>Conversor WEBP <span class="badge">PRO</span></h1>
        <p class="subtitle">Otimize suas imagens com facilidade</p>
      </header>

      <button id="selecionar-imagens" class="btn">Selecionar Imagens</button>
      <textarea id="lista-imagens" readonly class="textarea"></textarea>

      <label for="qualidade">Qualidade da Conversão:</label>
      <div class="range-container">
        <input
          type="range"
          id="qualidade"
          min="1"
          max="100"
          value="85"
          class="range"
        />
        <span id="valor-qualidade" class="value">85%</span>
      </div>

      <div id="barra-progresso-container">
        <progress
          id="barra-progresso"
          value="0"
          max="100"
          class="progress"
        ></progress>
      </div>

      <div class="buttons">
        <button id="botao-converter" class="btn">Converter Imagens</button>
        <button id="limpar-lista" class="btn clear">Limpar Lista</button>
      </div>

      <a
        href="https://www.linkedin.com/in/isllantoso/"
        id="linkedin"
        class="linkedin-link"
        >Acesse meu LinkedIn</a
      >

      <footer>Desenvolvido pelo Isllan Toso</footer>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
